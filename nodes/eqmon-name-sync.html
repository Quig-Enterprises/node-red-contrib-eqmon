<script type="text/javascript">
    RED.nodes.registerType('eqmon-name-sync', {
        category: 'EcoEye',
        color: '#5BAD72',
        defaults: {
            name:       { value: '' },
            server:     { value: '', type: 'eqmon-config', required: true },
            interval:   { value: 300 }
        },
        inputs: 1,
        outputs: 1,
        icon: 'font-awesome/fa-refresh',
        label: function () {
            return this.name || 'EcoEye name sync';
        },
        inputLabels:  ['manual trigger'],
        outputLabels: ['changes applied']
    });
</script>

<script type="text/html" data-template-name="eqmon-name-sync">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Optional label">
    </div>
    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-server"></i> eqmon server</label>
        <input type="text" id="node-input-server">
    </div>
    <div class="form-row">
        <label for="node-input-interval"><i class="fa fa-clock-o"></i> Poll interval (s)</label>
        <input type="number" id="node-input-interval" min="30" max="86400" style="width:100px">
        <div class="form-tips">How often to check eqmon for name changes. Default: 300s (5 min).</div>
    </div>
    <div class="form-tips" style="margin-top:8px">Name changes are written directly to the local SQLite database (<code>/overlay/telemetry.db</code>). No Node-RED credentials required.</div>
</script>

<script type="text/html" data-help-name="eqmon-name-sync">
    <p>Polls eqmon for sensor and gateway name changes, then applies them to the
    local Atrium gateway. This enables one-way name sync: <b>eqmon → gateway</b>.</p>

    <h3>How it works</h3>
    <ol>
        <li>Fetches current sensor names from eqmon (<code>GET /api/sensors.php</code>)</li>
        <li>Fetches gateway name from eqmon (<code>GET /api/admin/gateways.php</code>)</li>
        <li>Compares against a snapshot stored in flow context</li>
        <li>For each changed name: writes to <code>devices.sensor_name</code> and <code>sensor_meta.name</code> in the local SQLite DB</li>
        <li>For a changed gateway name: writes to <code>gateway_config</code> table</li>
    </ol>

    <h3>Trigger</h3>
    <p>Runs automatically on the configured interval. Send any message to the input
    to trigger an immediate sync.</p>

    <h3>Output</h3>
    <p>Only fires when at least one name was changed.</p>
    <dl class="message-properties">
        <dt>msg.payload.applied <span class="property-type">array</span></dt>
        <dd>List of <code>{device_id, old_name, new_name}</code> changes applied.</dd>
        <dt>msg.payload.gateway_renamed <span class="property-type">boolean</span></dt>
        <dd>True if the gateway name was updated.</dd>
    </dl>

    <h3>Snapshot reset</h3>
    <p>To force a full re-apply of all names, clear the flow context keys
    <code>eqmon_name_snapshot</code> and <code>eqmon_gw_name_snapshot</code>
    using an <b>eqmon-hwm-reset</b> node or a Change node.</p>
</script>
