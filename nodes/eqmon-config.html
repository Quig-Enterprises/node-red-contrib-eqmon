<script type="text/javascript">
    RED.nodes.registerType('eqmon-config', {
        category: 'config',
        defaults: {
            name:      { value: '' },
            baseUrl:   { value: 'https://telemetry.ecoeyetech.com/sync', required: true },
            gatewayId: { value: '' }
        },
        credentials: {
            apiKey: { type: 'password' }
        },
        label: function () {
            return this.name || this.gatewayId || 'EcoEye config';
        }
    });
</script>

<script type="text/html" data-template-name="eqmon-config">
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name" placeholder="Optional label">
    </div>
    <div class="form-row">
        <label for="node-config-input-baseUrl"><i class="fa fa-globe"></i> Base URL</label>
        <input type="text" id="node-config-input-baseUrl" placeholder="https://telemetry.ecoeyetech.com/sync">
    </div>
    <div class="form-row">
        <label for="node-config-input-gatewayId"><i class="fa fa-server"></i> Gateway ID</label>
        <input type="text" id="node-config-input-gatewayId" placeholder="auto-detected from gateway_mac">
        <div class="form-tips">Leave blank to auto-detect from the local SQLite DB (<code>gateway_config.gateway_mac</code>).</div>
    </div>
    <div class="form-row">
        <label for="node-config-input-apiKey"><i class="fa fa-key"></i> API Key</label>
        <input type="password" id="node-config-input-apiKey" placeholder="Gateway API key">
    </div>
</script>

<script type="text/html" data-help-name="eqmon-config">
    <p>Shared configuration for EcoEye gateway sync nodes.</p>
    <p>Set the eqmon base URL and the API key issued by eqmon for this gateway.</p>
    <p>The <b>Gateway ID</b> is auto-detected from <code>gateway_config.gateway_mac</code> in the local SQLite DB if left blank.</p>
</script>
